<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKNOFEST | Dijital Serüven CTF (Kolay)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }

        .bg-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: radial-gradient(circle at top right, rgba(14, 165, 233, 0.15), transparent),
                        linear-gradient(to bottom, rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 1)); 
        }
        
        .tech-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: all 0.3s ease; 
        }
        
        .glass-card:hover { 
            border-color: #0ea5e9; 
            transform: translateY(-4px); 
            box-shadow: 0 10px 30px -10px rgba(14, 165, 233, 0.3);
        }

        .btn-primary { 
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); 
            transition: all 0.2s; 
        }
        
        .btn-primary:hover { 
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); 
            filter: brightness(1.1);
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="min-h-screen">

    <div class="bg-overlay"></div>
    <div class="tech-pattern"></div>

    <!-- Giriş Ekranı -->
    <div id="authOverlay" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-card max-w-md w-full p-10 rounded-[2.5rem] text-center border-blue-500/20 shadow-2xl">
            <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <i data-lucide="rocket" class="w-10 h-10 text-blue-400"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter italic">Yeni Nesil <span class="text-blue-400">CTF</span></h2>
            <p class="text-slate-400 mb-8">Takım adını belirle ve siber yolculuğa adım at!</p>
            <input type="text" id="teamNameInput" placeholder="TAKIM ADINIZ" class="w-full bg-slate-900 border-2 border-white/10 rounded-2xl px-6 py-4 mb-4 focus:border-blue-500 outline-none text-center text-xl font-bold transition-all">
            <button onclick="joinCompetition()" id="joinBtn" class="w-full btn-primary py-4 rounded-2xl font-black uppercase tracking-[0.2em]">BAŞLA</button>
            <p id="authError" class="text-red-500 mt-4 hidden text-sm font-bold"></p>
        </div>
    </div>

    <!-- Navigasyon -->
    <nav class="sticky top-0 z-50 glass-card border-b border-white/10 px-6 py-4 flex justify-between items-center bg-slate-950/80">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest leading-none">TAKIM</span>
                <span class="text-xl font-bold tracking-tighter uppercase">
                    <span id="displayTeamName">Giriş Yapılıyor...</span>
                </span>
            </div>
        </div>
        <div class="flex gap-6 items-center">
            <div class="text-right hidden sm:block">
                <span class="block text-[10px] font-bold text-slate-500 uppercase">Puan Tablosu</span>
                <span id="userScoreDisplay" class="text-2xl font-black text-blue-400 leading-none">0 PTS</span>
            </div>
            <button onclick="showScoreboard()" class="hover:text-blue-400 transition flex items-center gap-2 bg-slate-800/50 p-3 rounded-xl border border-white/5 shadow-md">
                <i data-lucide="award" class="w-6 h-6 text-yellow-500"></i>
            </button>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto px-6 py-12">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black mb-4 uppercase tracking-tighter italic">TEKNOFEST <span class="text-blue-400">GÖREVİ</span></h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg leading-relaxed font-medium">Herkesin çözebileceği kolay sorularla siber dünyayı keşfet. <br>Bayrakları yakala, zirveye tırman!</p>
        </header>

        <div id="challengesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </main>

    <!-- Modallar -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/90 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass-card w-full max-w-lg p-10 rounded-[2.5rem] relative border-blue-500/20 shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white transition p-2 bg-slate-800 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="scoreboardOverlay" class="fixed inset-0 bg-black/90 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass-card w-full max-w-3xl p-10 rounded-[2.5rem] relative border-white/10">
            <button onclick="closeScoreboard()" class="absolute top-6 right-6 text-slate-400 hover:text-white transition"><i data-lucide="x" class="w-8 h-8"></i></button>
            <h2 class="text-4xl font-black mb-8 flex items-center gap-4 italic tracking-tighter uppercase"><i data-lucide="medal" class="text-yellow-500 w-10 h-10"></i> CANLI SIRALAMA</h2>
            <div class="overflow-x-auto max-h-[60vh]">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-white/10 text-slate-500 uppercase text-[10px] font-black tracking-widest">
                            <th class="py-4 px-4">SIRA</th>
                            <th class="py-4 px-4">TAKIM ADI</th>
                            <th class="py-4 px-4 text-center">BAŞARI PUANI</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboardBody"></tbody>
                </table>
            </div>
        </div>
    </div>

  <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";

// 🔥 AUTH
import { 
  getAuth, 
  signInAnonymously, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

// 🔥 FIRESTORE
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyBAIvWq_mk6dqRqBnkqqJVaHL95i1y4WEw",
    authDomain: "ctf19-35ee8.firebaseapp.com",
    projectId: "ctf19-35ee8",
    storageBucket: "ctf19-35ee8.firebasestorage.app",
    messagingSenderId: "99330699856",
    appId: "1:99330699856:web:e01e7dd95bd161d020d755",
    measurementId: "G-TCKMZZGYVL"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

        const challenges = [
            { id: 1, category: "Giriş", title: "Festivalin Adı", points: 50, difficulty: "Çok Kolay", description: "Dünyanın en büyük teknoloji festivalinin adı nedir?", flag: "teknofest" },
            { id: 2, category: "Teknoloji", title: "Milli Slogan", points: 100, difficulty: "Kolay", description: "Milli Teknoloji ______! Boşluğa ne gelmeli?", flag: "hamlesi" },
            { id: 3, category: "Ulaşım", title: "Yerli Otomobil", points: 100, difficulty: "Kolay", description: "Türkiye'nin yerli ve milli otomobilinin markası nedir?", flag: "togg" },
            { id: 4, category: "Havacılık", title: "Ünlü İHA", points: 100, difficulty: "Kolay", description: "Baykar tarafından üretilen meşhur insansız hava aracının adı?", flag: "bayraktar" },
            { id: 5, category: "Uzay", title: "İlk Astronot", points: 100, difficulty: "Kolay", description: "Uzaya giden ilk Türk astronotumuzun adı nedir?", flag: "alper gezeravcı" },
            { id: 6, category: "Tarih", title: "Büyük Önder", points: 100, difficulty: "Kolay", description: "'İstikbal Göklerdedir' sözü kime aittir?", flag: "atatürk" },
            { id: 7, category: "Yazılım", title: "Yılanlı Dil", points: 150, difficulty: "Kolay", description: "Adı bir yılan türü olan popüler yazılım dili?", flag: "python" },
            { id: 8, category: "Matematik", title: "Hızlı Hesap", points: 50, difficulty: "Çok Kolay", description: "19 + 19 işleminin sonucu kaçtır?", flag: "38" },
            { id: 9, category: "Donanım", title: "Beyin", points: 100, difficulty: "Kolay", description: "Bilgisayarın 'beyni' olarak bilinen parçanın kısaltması (3 harf)?", flag: "cpu" },
            { id: 10, category: "Festival", title: "İlk Şehir", points: 100, difficulty: "Kolay", description: "İlk TEKNOFEST hangi şehirde yapıldı?", flag: "istanbul" },
            { id: 11, category: "Siber", title: "Şifreli Kelime", points: 150, difficulty: "Kolay", description: "Base64 ile şifrelenmiş kelime: <b>VDUgVmFrZmk=</b> (Çözümü: T3 Vakfi)", flag: "t3 vakfi" },
            { id: 12, category: "Gizem", title: "Kaynak Kod", points: 200, difficulty: "Kolay", description: "Bu sayfanın en altında bir yorum satırı var mı? (Görmek için Ctrl+U yapabilirsin)", flag: "teknofest_bulut" },
            { id: 13, category: "Havacılık", title: "Çelik Kanat", points: 100, difficulty: "Kolay", description: "Türk Hava Kuvvetleri'nin gösteri ekibinin adı?", flag: "türk yıldızları" },
            { id: 14, category: "Teknoloji", title: "Anagram", points: 150, difficulty: "Kolay", description: "Harfleri düzelt: <b>K O R E T</b>", flag: "roket" },
            { id: 15, category: "Gelecek", title: "Uçan Araba", points: 100, difficulty: "Kolay", description: "Baykar'ın uçan araba projesinin adı?", flag: "cezeri" },
            { id: 16, category: "Ağ", title: "İnternet Adresi", points: 50, difficulty: "Çok Kolay", description: "Türkiye'nin ülke internet uzantısı nedir? (.com.tr'deki son kısım)", flag: "tr" },
            { id: 17, category: "Mobil", title: "QR Kod", points: 100, difficulty: "Kolay", description: "Telefon kamerasından okutulan kare şeklindeki kodlara ne denir?", flag: "qr kod" },
            { id: 18, category: "Eğitim", title: "Deneyap", points: 100, difficulty: "Kolay", description: "Gençlerin teknoloji eğitimi aldığı atölyelerin adı? (D...yap)", flag: "deneyap" },
            { id: 19, category: "Siber", title: "Kısaltma", points: 50, difficulty: "Çok Kolay", description: "Capture The Flag yarışmasının kısaltması?", flag: "ctf" },
            { id: 20, category: "Final", title: "Gelecek", points: 300, difficulty: "Orta", description: "TEKNOFEST sloganı: 'Gelecek ______' ! Boşluğu doldur.", flag: "sensin" }
        ];

        let teamData = { name: "", score: 0, solved: [] };
        let allTeams = [];

        window.joinCompetition = async () => {
            const name = document.getElementById('teamNameInput').value.trim().toUpperCase();
            if (!name) return;
            try {
                const userCred = await signInAnonymously(auth);
                const uid = userCred.user.uid;
                const teamRef = doc(db, 'leaderboard', uid);
                const snap = await getDoc(teamRef);
                if (!snap.exists()) {
                    await setDoc(teamRef, { name, score: 0, solved: [], lastUpdate: Date.now() });
                }
                document.getElementById('authOverlay').classList.add('hidden');
            } catch (err) { alert("Bağlantı Hatası: " + err.message); }
        };

        window.submitFlag = async (id) => {
            const rawInput = document.getElementById('flagInput').value.trim().toLowerCase();
            const ch = challenges.find(c => c.id === id);
            
            if (rawInput === ch.flag.toLowerCase()) {
                if (!teamData.solved.includes(id)) {
                    teamData.solved.push(id);
                    teamData.score += ch.points;
                    await setDoc(doc(db, 'leaderboard', auth.currentUser.uid), { ...teamData, lastUpdate: Date.now() });
                    window.closeModal();
                }
            } else { 
                const fb = document.getElementById('feedback');
                fb.innerText = "TEKRAR DENE!"; 
                fb.className = "text-red-500 font-black mt-4 animate-shake text-center block tracking-widest";
                fb.classList.remove('hidden'); 
            }
        };

        window.openChallenge = (id) => {
            const ch = challenges.find(c => c.id === id);
            document.getElementById('modalContent').innerHTML = `
                <div class="mb-6">
                    <span class="text-blue-400 text-xs font-black uppercase tracking-[0.2em]">${ch.category}</span>
                    <h2 class="text-3xl font-black mt-2 uppercase italic leading-none">${ch.title}</h2>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-white/5 mb-8 shadow-inner">
                    <p class="text-slate-300 text-lg leading-relaxed font-medium">${ch.description}</p>
                </div>
                <input type="text" id="flagInput" placeholder="Cevabı yazın..." class="w-full bg-slate-950 border-2 border-white/10 rounded-2xl px-6 py-4 mb-4 focus:border-blue-500 outline-none text-xl font-bold mono transition-all">
                <button onclick="submitFlag(${ch.id})" class="w-full btn-primary py-4 rounded-2xl font-black uppercase tracking-widest text-lg shadow-lg">KONTROL ET</button>
                <span id="feedback" class="hidden"></span>
            `;
            document.getElementById('modalOverlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('flagInput').focus(), 100);
        };

        window.closeModal = () => document.getElementById('modalOverlay').classList.add('hidden');
        window.closeScoreboard = () => document.getElementById('scoreboardOverlay').classList.add('hidden');

        function render() {
            const grid = document.getElementById('challengesGrid');
            grid.innerHTML = challenges.map(ch => {
                const isSolved = teamData.solved.includes(ch.id);
                return `
                    <div onclick="openChallenge(${ch.id})" class="glass-card p-6 rounded-[2rem] cursor-pointer ${isSolved?'opacity-30 grayscale pointer-events-none shadow-none':'shadow-xl'}">
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-blue-400 text-[10px] font-black uppercase tracking-widest bg-blue-400/10 px-2 py-0.5 rounded">${ch.category}</span>
                            <span class="font-black text-white/80 text-sm">${ch.points} PTS</span>
                        </div>
                        <h3 class="text-xl font-black uppercase italic tracking-tight mb-4">${ch.title}</h3>
                        <div class="flex items-center gap-2 text-[10px] text-slate-500 font-bold uppercase">
                            <i data-lucide="award" class="w-3 h-3"></i>
                            <span>${ch.difficulty}</span>
                        </div>
                        ${isSolved?'<div class="mt-4 text-blue-400 font-black flex items-center gap-2 text-xs"><i data-lucide="check-circle" class="w-4 h-4"></i> TAMAMLANDI</div>':''}
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        window.showScoreboard = () => {
            const body = document.getElementById('scoreboardBody');
            const sorted = [...allTeams].sort((a,b) => b.score - a.score || a.lastUpdate - b.lastUpdate);
            body.innerHTML = sorted.map((t, i) => `
                <tr class="border-b border-white/5 ${t.uid === auth.currentUser?.uid ? 'bg-blue-500/10' : ''}">
                    <td class="py-6 px-4 font-black text-2xl ${i<3?'text-yellow-500':'text-slate-600'}">#${i+1}</td>
                    <td class="py-6 px-4"><span class="font-black text-lg ${t.uid === auth.currentUser?.uid ? 'text-blue-400' : 'text-slate-200'}">${t.name}</span></td>
                    <td class="py-6 px-4 text-center font-black text-2xl text-white">${t.score}</td>
                </tr>
            `).join('');
            document.getElementById('scoreboardOverlay').classList.remove('hidden');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, 'leaderboard', user.uid), (s) => { 
                    if(s.exists()){ 
                        teamData = s.data(); 
                        document.getElementById('displayTeamName').innerText = teamData.name; 
                        document.getElementById('userScoreDisplay').innerText = teamData.score + " PTS"; 
                        render(); 
                        document.getElementById('authOverlay').classList.add('hidden'); 
                    } 
                });
                onSnapshot(collection(db, 'leaderboard'), (s) => { 
                    allTeams = []; 
                    s.forEach(d => allTeams.push({ ...d.data(), uid: d.id })); 
                    if(!document.getElementById('scoreboardOverlay').classList.contains('hidden')) window.showScoreboard(); 
                });
            }
        });
        lucide.createIcons();
    </script>
    <!-- Gizli Bayrak: teknofest_bulut -->
</body>
</html>
